<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WH-C06 實時測力計與圖表</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f7;
            color: #1d1d1f;
        }

        .warning-box {
            background-color: #fff3cd;
            color: #856404;
            padding: 16px 20px;
            border-radius: 8px;
            border: 1px solid #ffeeba;
            max-width: 600px;
            width: 100%;
            margin-bottom: 24px;
            line-height: 1.5;
            box-sizing: border-box;
        }

        .warning-box h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
        }

        .warning-box ol {
            margin: 0;
            padding-left: 20px;
        }

        .code-snippet {
            background: #e9ecef;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            word-break: break-all;
        }

        .copy-btn {
            background-color: #6c757d;
            color: white;
            border: none;
            padding: 4px 8px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 8px;
        }

        .copy-btn:hover {
            background-color: #5a6268;
        }

        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            text-align: center;
            width: 500px;
            max-width: 100%;
            box-sizing: border-box;
        }

        h1 {
            font-size: 20px;
            margin: 0 0 8px 0;
            font-weight: 600;
        }

        .status {
            font-size: 14px;
            color: #86868b;
            margin-bottom: 16px;
            min-height: 20px;
        }

        .weight-container {
            margin: 20px 0;
        }

        .weight {
            font-size: 64px;
            font-weight: 700;
            color: #007aff;
            line-height: 1;
            transition: color 0.2s;
        }

        .unit {
            font-size: 24px;
            font-weight: 500;
            color: #86868b;
        }

        canvas {
            width: 100%;
            height: 200px;
            background-color: #fafafa;
            border: 1px solid #e5e5ea;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .action-btn {
            background-color: #007aff;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background-color: #0063cc;
        }

        .action-btn:disabled {
            background-color: #d1d1d6;
            cursor: not-allowed;
            color: #86868b;
        }
    </style>
</head>

<body>

    <div class="warning-box" id="warning-box">
        <h2>環境與設定要求</h2>
        <ol>
            <li>瀏覽器：僅限 <strong>Google Chrome</strong>。</li>
            <li>功能啟用：請複製下方網址至網址列，將該選項設為 <strong>Enabled</strong> 並重新啟動瀏覽器。<br>
                <span class="code-snippet"
                    id="flag-url">chrome://flags/#enable-experimental-web-platform-features</span>
                <button class="copy-btn" onclick="copyUrl()">複製</button>
            </li>
        </ol>
    </div>

    <div class="card">
        <h1>WH-C06 即時數據與圖表</h1>
        <div id="status" class="status">等待連接設備...</div>

        <div class="weight-container">
            <span id="weight" class="weight">0.00</span>
            <span id="unit" class="unit">kg</span>
        </div>

        <canvas id="live-chart" width="500" height="200"></canvas>

        <button id="connect-btn" class="action-btn">連接藍牙</button>
    </div>

    <script>
        function copyUrl() {
            const urlText = document.getElementById('flag-url').innerText;
            navigator.clipboard.writeText(urlText).then(() => {
                alert('已複製網址，請貼上至新分頁執行設定。');
            }).catch(err => console.error('複製失敗:', err));
        }

        const connectBtn = document.getElementById('connect-btn');
        const statusEl = document.getElementById('status');
        const weightEl = document.getElementById('weight');
        const unitEl = document.getElementById('unit');

        // 圖表相關設定
        const canvas = document.getElementById('live-chart');
        const ctx = canvas.getContext('2d');
        const chartData = [];
        const MAX_DATA_POINTS = 100; // 圖表顯示的最大資料筆數

        const WEIGHT_OFFSET = 0;
        const STABLE_OFFSET = 2;
        const SCALE_FACTOR = 100;

        connectBtn.addEventListener('click', async () => {
            if (!navigator.bluetooth) {
                statusEl.innerText = '錯誤：瀏覽器不支援 Web Bluetooth';
                return;
            }

            try {
                statusEl.innerText = '正在掃描設備...';

                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'Weiheng' }, { namePrefix: 'WH-C06' }],
                    optionalServices: []
                });

                if (!device.watchAdvertisements) {
                    throw new Error('未啟用 watchAdvertisements 功能，請參考上方指示設定。');
                }

                device.addEventListener('advertisementreceived', handleAdvertisement);
                await device.watchAdvertisements();

                statusEl.innerText = `已連接：${device.name}`;
                connectBtn.disabled = true;
                connectBtn.innerText = '接收數據中';

            } catch (error) {
                console.error('連線錯誤:', error);
                statusEl.innerText = `失敗：${error.message}`;
            }
        });

        function handleAdvertisement(event) {
            for (const [manufacturerId, dataView] of event.manufacturerData.entries()) {
                if (dataView.byteLength >= 3) {
                    const rawWeight = (dataView.getUint8(WEIGHT_OFFSET) << 8) | dataView.getUint8(WEIGHT_OFFSET + 1);
                    const weightValue = parseFloat((rawWeight / SCALE_FACTOR).toFixed(2));

                    const statusByte = dataView.getUint8(STABLE_OFFSET);
                    const isStable = ((statusByte & 0xf0) >> 4) === 1;
                    const unitCode = statusByte & 0x0f;
                    const unitString = unitCode === 0 ? "kg" : "lb";

                    // 更新文字顯示
                    weightEl.innerText = weightValue.toFixed(2);
                    unitEl.innerText = unitString;
                    weightEl.style.color = isStable ? '#34c759' : '#007aff';

                    // 更新圖表資料
                    updateChart(weightValue);
                }
            }
        }

        function updateChart(weight) {
            chartData.push(weight);
            if (chartData.length > MAX_DATA_POINTS) {
                chartData.shift();
            }
            drawChart();
        }

        function drawChart() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (chartData.length < 2) return;

            // 計算動態 Y 軸比例，最小基準設為 10
            const maxWeight = Math.max(...chartData, 10);
            const stepX = canvas.width / (MAX_DATA_POINTS - 1);

            ctx.beginPath();
            ctx.strokeStyle = '#007aff';
            ctx.lineWidth = 3;
            ctx.lineJoin = 'round';

            chartData.forEach((weight, index) => {
                const x = index * stepX;
                // 將數值映射至畫布高度，預留 10% 頂部邊距
                const y = canvas.height - ((weight / maxWeight) * canvas.height * 0.9);

                if (index === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });

            ctx.stroke();
        }

        // 初始化空圖表
        drawChart();
    </script>
</body>

</html>
