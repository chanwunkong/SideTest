<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climbing Toolbox</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        .i18n-loading {
            opacity: 0;
        }

        body {
            transition: opacity 0.3s ease-in;
        }
    </style>

    <script src="config.js"></script>
    <script src="js/modules/i18n.js"></script>
</head>

<body class="bg-slate-50 text-slate-900 transition-colors duration-300 i18n-loading">

    <nav class="nav-blur">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-slate-900 rounded-lg flex items-center justify-center text-white font-bold">C
                </div>
                <span class="font-bold text-lg tracking-tight">Climbing Toolbox</span>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="i18n.toggle()" data-i18n="langText"
                    class="text-xs font-bold px-3 py-1.5 border border-slate-200 rounded-full hover:bg-slate-100 transition-colors">
                    中文
                </button>
                <div id="auth-section">
                    <button id="login-btn" onclick="handleGoogleLogin()" data-i18n="login"
                        class="text-sm font-semibold bg-slate-900 text-white px-4 py-2 rounded-full hover:bg-slate-800 transition-colors">
                        Login
                    </button>
                    <div id="user-info" class="hidden flex items-center gap-3">
                        <img id="user-avatar" class="w-8 h-8 rounded-full border border-slate-200" src="" alt="avatar">
                        <button onclick="handleLogout()" data-i18n="logout"
                            class="text-sm text-slate-500 hover:text-slate-900">Logout</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-12">
        <header class="text-center mb-16">
            <h1 data-i18n="heroTitle" class="text-4xl md:text-5xl font-extrabold mb-4 tracking-tight text-gradient">
                Digital Toolbox for Climbers
            </h1>
            <p data-i18n="heroDesc" class="text-lg text-slate-500 max-w-3xl mx-auto leading-relaxed">
                AI-Assisted Development: Designed for those who love to climb.
            </p>
        </header>

        <section class="mb-20">
            <div class="flex items-center gap-3 mb-8">
                <h2 data-i18n="coreTitle" class="text-2xl font-bold">Core Tools</h2>
                <span data-i18n="badgeLive" class="bg-blue-100 text-blue-600 status-badge">Version 1.1 Live</span>
            </div>
            <div id="core-tools-container" class="grid md:grid-cols-2 gap-6">
            </div>
        </section>

        <section class="mb-20">
            <h2 data-i18n="changelogTitle" class="text-2xl font-bold mb-8">Changelog</h2>
            <div id="changelog-container"
                class="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm">
            </div>
        </section>

        <section>
            <h2 data-i18n="queueTitle" class="text-2xl font-bold mb-8 text-slate-400">Features in Queue</h2>
            <div id="queue-container" class="grid md:grid-cols-2 gap-6">
            </div>
        </section>
    </main>

    <footer class="bg-white border-t border-slate-200 py-12 mt-20 text-center">
        <div class="mb-6 flex flex-col items-center gap-2">
            <span data-i18n="contactUs" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Contact
                Us</span>
            <a href="mailto:chanwunkong@gmail.com"
                class="text-slate-600 hover:text-blue-600 font-medium transition-colors border-b border-slate-200 hover:border-blue-600 pb-0.5">
                chanwunkong@gmail.com
            </a>
        </div>
        <p data-i18n="footerCopy" class="text-sm text-slate-400">© 2026 Climbing Toolbox. Designed for those who love to
            climb.</p>
    </footer>

    <script>
        async function loadContentData() {
            try {
                const response = await fetch('data/content.json');
                const data = await response.json();

                // 渲染 Core Tools
                const coreContainer = document.getElementById('core-tools-container');
                coreContainer.innerHTML = data.coreTools.map(tool => `
                    <a href="${tool.href}" class="feature-card p-8 group">
                        <div class="w-12 h-12 ${tool.iconClass} rounded-2xl flex items-center justify-center mb-6 transition-colors">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                ${tool.iconSvg}
                            </svg>
                        </div>
                        <h3 data-i18n="${tool.title.key}" class="text-xl font-bold mb-3">${tool.title.text}</h3>
                        <p data-i18n="${tool.desc.key}" class="text-slate-500 text-sm mb-4 leading-relaxed">${tool.desc.text}</p>
                        <ul class="text-sm text-slate-600 space-y-3 mb-6">
                            ${tool.features.map(f => `
                            <li class="flex items-start gap-2">
                                <div class="w-1.5 h-1.5 ${tool.dotClass} rounded-full mt-1.5 shrink-0"></div>
                                <span data-i18n="${f.key}">${f.text}</span>
                            </li>
                            `).join('')}
                        </ul>
                        <div data-i18n="${tool.future.key}" class="text-xs font-semibold ${tool.future.class}">${tool.future.text}</div>
                    </a>
                `).join('');

                // 渲染 Changelog
                const logContainer = document.getElementById('changelog-container');
                logContainer.innerHTML = data.changelog.map((log, index) => `
                    <div class="p-6 ${index > 0 ? 'border-t ' : ''}border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                        <span class="text-sm font-bold text-slate-900">${log.date}</span>
                        <span data-i18n="${log.tag.key}" class="text-xs px-2 py-1 ${log.tag.class} rounded-md font-bold text-center">${log.tag.text}</span>
                    </div>
                    <div data-i18n="${log.desc.key}" class="p-6 text-sm text-slate-500 leading-relaxed">${log.desc.text}</div>
                `).join('');

                // 渲染 Queue
                const queueContainer = document.getElementById('queue-container');
                queueContainer.innerHTML = data.queue.map(q => `
                    <div class="p-6 bg-slate-100 rounded-2xl border border-dashed border-slate-300">
                        <h4 data-i18n="${q.title.key}" class="font-bold text-slate-500 mb-2">${q.title.text}</h4>
                        <p data-i18n="${q.desc.key}" class="text-xs text-slate-400">${q.desc.text}</p>
                    </div>
                `).join('');

                // 確保動態生成的 DOM 完成後重新套用 i18n
                if (typeof i18n !== 'undefined' && typeof i18n.updatePage === 'function') {
                    i18n.updatePage();
                }
            } catch (error) {
                console.error('Failed to load content data:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', loadContentData);

        auth.onAuthStateChanged(user => {
            const loginBtn = document.getElementById('login-btn');
            const userInfo = document.getElementById('user-info');
            const avatar = document.getElementById('user-avatar');
            if (user) {
                loginBtn.classList.add('hidden');
                userInfo.classList.remove('hidden');
                avatar.src = user.photoURL || 'https://via.placeholder.com/32';
            } else {
                loginBtn.classList.remove('hidden');
                userInfo.classList.add('hidden');
            }
        });
    </script>
</body>

</html>
