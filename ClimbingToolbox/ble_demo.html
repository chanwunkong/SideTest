<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WH-C06 / IF_B7 實時測力計 (原生源碼解析版)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f7;
            color: #1d1d1f;
        }

        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            text-align: center;
            width: 500px;
            max-width: 100%;
            box-sizing: border-box;
        }

        .status {
            font-size: 14px;
            color: #86868b;
            margin-bottom: 16px;
            min-height: 20px;
        }

        .weight-container {
            margin: 20px 0;
        }

        .weight {
            font-size: 64px;
            font-weight: 700;
            color: #007aff;
            line-height: 1;
            transition: color 0.2s;
        }

        .unit {
            font-size: 24px;
            font-weight: 500;
            color: #86868b;
        }

        canvas {
            width: 100%;
            height: 200px;
            background-color: #fafafa;
            border: 1px solid #e5e5ea;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .action-btn {
            background-color: #007aff;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .action-btn:disabled {
            background-color: #d1d1d6;
            cursor: not-allowed;
            color: #86868b;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>WH-C06 (IF_B7) 即時數據</h1>
        <div id="status" class="status">等待連接設備...</div>

        <div class="weight-container">
            <span id="weight" class="weight">0.00</span>
            <span id="unit" class="unit">kg</span>
        </div>

        <canvas id="live-chart" width="500" height="200"></canvas>

        <button id="connect-btn" class="action-btn">連接藍牙 (過濾 ID: 256)</button>
    </div>

    <script>
        const connectBtn = document.getElementById('connect-btn');
        const statusEl = document.getElementById('status');
        const weightEl = document.getElementById('weight');
        const canvas = document.getElementById('live-chart');
        const ctx = canvas.getContext('2d');

        // --- 提取自源碼的關鍵常數 ---
        const MANUFACTURER_ID = 256; // 0x0100
        const WEIGHT_OFFSET = 10;
        const TIMEOUT_SECONDS = 10;

        const chartData = [];
        const MAX_DATA_POINTS = 100;
        let advertisementTimeout = null;
        let connectedDevice = null;

        connectBtn.addEventListener('click', async () => {
            try {
                statusEl.innerText = '正在掃描設備...';

                // 1. 完全依照源碼的過濾邏輯：只找 Manufacturer ID 為 256 的設備，忽略名稱差異
                connectedDevice = await navigator.bluetooth.requestDevice({
                    filters: [{
                        manufacturerData: [{ companyIdentifier: MANUFACTURER_ID }]
                    }],
                    optionalManufacturerData: [MANUFACTURER_ID]
                });

                if (!connectedDevice.watchAdvertisements) {
                    throw new Error('未啟用 watchAdvertisements 功能');
                }

                // 2. 註冊監聽與啟動
                connectedDevice.addEventListener('advertisementreceived', handleAdvertisement);
                await connectedDevice.watchAdvertisements();

                statusEl.innerText = `已連接：${connectedDevice.name || 'IF_B7 設備'}`;
                connectBtn.disabled = true;
                connectBtn.innerText = '接收數據中';

                resetAdvertisementTimeout();

            } catch (error) {
                console.error('連線錯誤:', error);
                statusEl.innerText = `失敗：${error.message}`;
            }
        });

        function handleAdvertisement(event) {
            // 3. 依照源碼邏輯：直接抓取 ID 256 的 Manufacturer Data
            const data = event.manufacturerData.get(MANUFACTURER_ID);

            if (data && data.byteLength >= WEIGHT_OFFSET + 2) {
                // 重置斷線計時器
                resetAdvertisementTimeout();

                // 4. 依照源碼邏輯：從 Offset 10 開始取 2 個 Byte 組合，並除以 100
                const rawWeight = (data.getUint8(WEIGHT_OFFSET) << 8) | data.getUint8(WEIGHT_OFFSET + 1);
                let currentMass = rawWeight / 100;

                // 修正負數顯示 (源碼有做 Math.max(-1000, data) 處理)
                currentMass = Math.max(-1000, currentMass);

                // 更新文字 UI
                weightEl.innerText = currentMass.toFixed(2);

                // 更新圖表
                updateChart(currentMass);
            }
        }

        // --- 源碼中的 10 秒自動斷線保護機制 ---
        function resetAdvertisementTimeout() {
            if (advertisementTimeout) {
                clearTimeout(advertisementTimeout);
            }
            advertisementTimeout = setTimeout(() => {
                statusEl.innerText = '設備已離線 (超過 10 秒未收到數據)';
                console.error(`超過 ${TIMEOUT_SECONDS} 秒未收到廣播，停止追蹤..`);
                if (connectedDevice) {
                    connectedDevice.removeEventListener('advertisementreceived', handleAdvertisement);
                }
                connectBtn.disabled = false;
                connectBtn.innerText = '重新連接';
            }, TIMEOUT_SECONDS * 1000);
        }

        // --- 圖表繪製邏輯 ---
        function updateChart(weight) {
            chartData.push(weight);
            if (chartData.length > MAX_DATA_POINTS) chartData.shift();

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (chartData.length < 2) return;

            const maxWeight = Math.max(...chartData, 10);
            const stepX = canvas.width / (MAX_DATA_POINTS - 1);

            ctx.beginPath();
            ctx.strokeStyle = '#007aff';
            ctx.lineWidth = 3;
            ctx.lineJoin = 'round';

            chartData.forEach((w, index) => {
                const x = index * stepX;
                const y = canvas.height - ((w / maxWeight) * canvas.height * 0.9);
                if (index === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();
        }
    </script>
</body>

</html>
