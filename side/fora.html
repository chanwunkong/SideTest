<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORA 藍牙設備檢測與模擬系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .log-container { scroll-behavior: smooth; }
        
        /* 更新資料時的閃爍動畫 */
        @keyframes flashUpdate {
            0% { background-color: #fef08a; transform: scale(1.05); }
            100% { background-color: transparent; transform: scale(1); }
        }
        .flash-active {
            animation: flashUpdate 0.6s ease-out;
            border-radius: 0.25rem;
        }
    </style>
    <!-- 動態生成 PWA Manifest 的佔位符 -->
    <link rel="manifest" id="dynamic-manifest">
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto space-y-6">
        <header class="mb-8 flex justify-between items-end border-b border-gray-200 pb-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">FORA 藍牙設備系統</h1>
                <p class="text-gray-600 mt-2">支援 Web Bluetooth API 與 PWA 離線架構。</p>
            </div>
            <div class="text-sm font-medium text-gray-500 bg-gray-100 px-3 py-1 rounded">
                PWA 就緒狀態: <span id="pwa-status" class="text-blue-600">初始化中...</span>
            </div>
        </header>

        <!-- 新增：置頂身份與病歷上傳版面 -->
        <div class="bg-white rounded-xl shadow-sm border border-indigo-200 p-6 mb-8">
            <h2 class="text-xl font-semibold text-indigo-800 mb-4">身份確認與病歷資料上傳</h2>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- 左側：輸入與操作 -->
                <div class="space-y-4">
                    <div>
                        <label for="patient-id" class="block text-sm font-medium text-gray-700 mb-1">病歷號</label>
                        <input type="text" id="patient-id" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="輸入病歷號...">
                    </div>
                    <div class="flex justify-between items-center bg-gray-50 p-3 rounded border border-gray-200">
                        <span class="text-sm font-medium text-gray-700">待上傳筆數：</span>
                        <span id="pending-count" class="text-lg font-bold text-indigo-600">0</span>
                    </div>
                    <button id="btn-upload" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded transition-colors disabled:bg-gray-400 disabled:cursor-not-allowed" disabled>
                        執行上傳
                    </button>
                </div>
                <!-- 右側：待上傳清單 -->
                <div class="lg:col-span-2 flex flex-col">
                    <h3 class="text-sm font-medium text-gray-700 mb-2 border-b pb-1">未上傳紀錄列表</h3>
                    <ul id="pending-list" class="space-y-2 max-h-40 overflow-y-auto text-sm bg-gray-50 p-2 rounded border border-gray-100 flex-grow">
                        <li class="text-gray-400 text-center py-2">目前無待上傳資料</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- 體溫計區塊 -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-semibold text-gray-800">紅外線額溫槍TD-1242B</h2>
                        <select id="mode-temp" class="text-sm border border-gray-300 rounded p-1 text-gray-700 bg-white focus:outline-none focus:ring-1 focus:ring-blue-500">
                            <option value="ble">藍牙連線</option>
                            <option value="manual">手動輸入</option>
                        </select>
                    </div>

                    <!-- 藍牙模式 -->
                    <div id="section-temp-ble">
                        <div class="flex items-center space-x-4 mb-6">
                            <button id="btn-temp-connect" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded transition-colors">
                                連線設備
                            </button>
                            <button id="btn-temp-disconnect" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-2 px-4 rounded transition-colors hidden">
                                斷開連線
                            </button>
                            <span id="temp-status" class="text-sm font-medium text-gray-500">未連線</span>
                        </div>
                        <div class="bg-blue-50 rounded-lg p-6 text-center">
                            <div class="text-sm text-blue-600 font-medium mb-1">最新測量溫度</div>
                            <div class="text-4xl font-bold text-blue-900 inline-block px-4 py-1" id="temp-display-container">
                                <span id="temp-value">--</span>
                                <span id="temp-unit" class="text-2xl"></span>
                            </div>
                        </div>
                    </div>

                    <!-- 手動模式 -->
                    <div id="section-temp-manual" class="hidden space-y-4 bg-gray-50 p-4 rounded-lg border border-gray-200">
                        <div class="flex space-x-2">
                            <input type="number" id="manual-temp-val" step="0.1" placeholder="輸入溫度數值 (例如: 36.5)" class="flex-1 border border-gray-300 rounded px-3 py-2 text-center focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <select id="manual-temp-unit" class="border border-gray-300 rounded px-3 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="C">°C</option>
                                <option value="F">°F</option>
                            </select>
                        </div>
                        <button id="btn-manual-temp-add" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded transition-colors">加入紀錄</button>
                    </div>
                </div>

                <!-- 血氧機區塊 -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-semibold text-gray-800">血氧濃度計TD-8255B</h2>
                        <select id="mode-o2" class="text-sm border border-gray-300 rounded p-1 text-gray-700 bg-white focus:outline-none focus:ring-1 focus:ring-teal-500">
                            <option value="ble">藍牙連線</option>
                            <option value="manual">手動輸入</option>
                        </select>
                    </div>

                    <!-- 藍牙模式 -->
                    <div id="section-o2-ble">
                        <div class="flex items-center space-x-4 mb-6">
                            <button id="btn-o2-connect" class="bg-teal-600 hover:bg-teal-700 text-white font-medium py-2 px-4 rounded transition-colors">
                                連線設備
                            </button>
                            <button id="btn-o2-disconnect" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-2 px-4 rounded transition-colors hidden">
                                斷開連線
                            </button>
                            <span id="o2-status" class="text-sm font-medium text-gray-500">未連線</span>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-teal-50 rounded-lg p-4 text-center">
                                <div class="text-sm text-teal-600 font-medium mb-1">血氧 (SpO2)</div>
                                <div class="text-3xl font-bold text-teal-900 inline-block px-4 py-1" id="o2-spo2-container">
                                    <span id="o2-spo2-value">--</span><span class="text-lg">%</span>
                                </div>
                            </div>
                            <div class="bg-rose-50 rounded-lg p-4 text-center">
                                <div class="text-sm text-rose-600 font-medium mb-1">心率 (HR)</div>
                                <div class="text-3xl font-bold text-rose-900 inline-block px-4 py-1" id="o2-hr-container">
                                    <span id="o2-hr-value">--</span><span class="text-lg">bpm</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 手動模式 -->
                    <div id="section-o2-manual" class="hidden space-y-4 bg-gray-50 p-4 rounded-lg border border-gray-200">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" id="manual-o2-spo2" placeholder="血氧 SpO2 (%)" class="border border-gray-300 rounded px-3 py-2 text-center focus:outline-none focus:ring-2 focus:ring-teal-500">
                            <input type="number" id="manual-o2-hr" placeholder="心率 HR (bpm)" class="border border-gray-300 rounded px-3 py-2 text-center focus:outline-none focus:ring-2 focus:ring-teal-500">
                        </div>
                        <button id="btn-manual-o2-add" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-medium py-2 rounded transition-colors">加入紀錄</button>
                    </div>
                </div>

                <!-- 血糖血壓機區塊 (FORA D40B) -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-semibold text-gray-800">2合1血糖血壓套組 TD-3261B</h2>
                        <select id="mode-d40" class="text-sm border border-gray-300 rounded p-1 text-gray-700 bg-white focus:outline-none focus:ring-1 focus:ring-purple-500">
                            <option value="ble">藍牙連線</option>
                            <option value="manual">手動輸入</option>
                        </select>
                    </div>

                    <!-- 藍牙模式 -->
                    <div id="section-d40-ble">
                        <div class="flex items-center space-x-4 mb-6">
                            <button id="btn-d40-connect" class="bg-purple-600 hover:bg-purple-700 text-white font-medium py-2 px-4 rounded transition-colors">
                                連線設備
                            </button>
                            <button id="btn-d40-disconnect" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-2 px-4 rounded transition-colors hidden">
                                斷開連線
                            </button>
                            <span id="d40-status" class="text-sm font-medium text-gray-500">未連線</span>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-purple-50 rounded-lg p-4 text-center">
                                <div class="text-sm text-purple-600 font-medium mb-1">血壓 (SYS/DIA)</div>
                                <div class="text-3xl font-bold text-purple-900 inline-block px-4 py-1" id="d40-bp-container">
                                    <span id="d40-sys-value">--</span> / <span id="d40-dia-value">--</span><span class="text-lg">mmHg</span>
                                </div>
                            </div>
                            <div class="bg-fuchsia-50 rounded-lg p-4 text-center">
                                <div class="text-sm text-fuchsia-600 font-medium mb-1">血糖 (Glucose)</div>
                                <div class="text-3xl font-bold text-fuchsia-900 inline-block px-4 py-1" id="d40-bg-container">
                                    <span id="d40-bg-value">--</span><span class="text-lg">mg/dL</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 手動模式 -->
                    <div id="section-d40-manual" class="hidden space-y-4 bg-gray-50 p-4 rounded-lg border border-gray-200">
                        <select id="manual-d40-type" class="w-full border border-gray-300 rounded px-3 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-purple-500">
                            <option value="bp">血壓輸入</option>
                            <option value="bg">血糖輸入</option>
                        </select>
                        
                        <div id="manual-d40-bp-inputs" class="grid grid-cols-2 gap-3">
                            <input type="number" id="manual-d40-sys" placeholder="收縮壓 SYS" class="border border-gray-300 rounded px-3 py-2 text-center focus:outline-none focus:ring-2 focus:ring-purple-500">
                            <input type="number" id="manual-d40-dia" placeholder="舒張壓 DIA" class="border border-gray-300 rounded px-3 py-2 text-center focus:outline-none focus:ring-2 focus:ring-purple-500">
                        </div>
                        
                        <div id="manual-d40-bg-inputs" class="hidden">
                            <input type="number" id="manual-d40-bg" placeholder="血糖值 (mg/dL)" class="w-full border border-gray-300 rounded px-3 py-2 text-center focus:outline-none focus:ring-2 focus:ring-fuchsia-500">
                        </div>
                        
                        <button id="btn-manual-d40-add" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-medium py-2 rounded transition-colors">加入紀錄</button>
                    </div>
                </div>

        </div>

        <!-- 系統日誌區塊 -->
        <div class="bg-gray-900 rounded-xl shadow-sm overflow-hidden flex flex-col h-48 mt-8">
            <div class="bg-gray-800 px-4 py-2 border-b border-gray-700 flex justify-between items-center">
                <span class="text-sm font-medium text-gray-300">系統日誌</span>
                <button id="btn-clear-log" class="text-xs text-gray-400 hover:text-white">清除</button>
            </div>
            <div id="log-output" class="p-4 overflow-y-auto text-xs font-mono text-green-400 space-y-1 log-container flex-grow">
                <div>系統就緒。</div>
            </div>
        </div>

    </div>

    <script>
        // --- PWA 實作 ---
        function initPWA() {
            try {
                const manifest = {
                    name: "FORA 設備整合系統",
                    short_name: "FORA 系統",
                    display: "standalone",
                    background_color: "#ffffff",
                    theme_color: "#4f46e5",
                    icons: [{ src: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI1MCIgZmlsbD0iIzRmNDZlNSIvPjwvc3ZnPg==", sizes: "192x192", type: "image/svg+xml" }]
                };
                const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
                document.getElementById('dynamic-manifest').href = URL.createObjectURL(manifestBlob);

                if ('serviceWorker' in navigator) {
                    const swCode = `
                        self.addEventListener('install', (e) => self.skipWaiting());
                        self.addEventListener('activate', (e) => self.clients.claim());
                        self.addEventListener('fetch', (e) => {});
                    `;
                    const swBlob = new Blob([swCode], { type: 'application/javascript' });
                    const swUrl = URL.createObjectURL(swBlob);
                    
                    navigator.serviceWorker.register(swUrl)
                        .then(() => {
                            document.getElementById('pwa-status').textContent = '已註冊';
                            document.getElementById('pwa-status').className = 'text-green-600';
                        })
                        .catch(err => {
                            console.warn('SW 註冊受限', err);
                            document.getElementById('pwa-status').textContent = '僅限 HTTPS / Localhost';
                        });
                }
            } catch (error) {
                console.error("PWA 初始化失敗", error);
            }
        }
        initPWA();

        // --- 狀態管理與日誌系統 ---
        const logOutput = document.getElementById('log-output');
        let pendingRecords = [];
        
        let tempDevice = null;
        let tempCharacteristic = null;
        let o2Device = null;
        let o2Characteristic = null;
        let d40Device = null;
        let d40Characteristic = null;

        function log(message, type = 'info') {
            const time = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            let colorClass = 'text-gray-300';
            if (type === 'error') colorClass = 'text-red-400';
            if (type === 'success') colorClass = 'text-green-400';
            if (type === 'data') colorClass = 'text-blue-300';
            
            div.className = colorClass;
            div.textContent = `[${time}] ${message}`;
            logOutput.appendChild(div);
            logOutput.scrollTop = logOutput.scrollHeight;
        }

        document.getElementById('btn-clear-log').addEventListener('click', () => {
            logOutput.innerHTML = '<div>日誌已清除。</div>';
        });

        function buf2hex(buffer) {
            return Array.prototype.map.call(new Uint8Array(buffer), x => ('00' + x.toString(16)).slice(-2).toUpperCase()).join('-');
        }

        function triggerUIFlash(elementId) {
            const el = document.getElementById(elementId);
            el.classList.remove('flash-active');
            void el.offsetWidth;
            el.classList.add('flash-active');
        }

        // --- 切換模式邏輯 ---
        function setupModeToggle(selectId, bleSectionId, manualSectionId) {
            document.getElementById(selectId).addEventListener('change', (e) => {
                const isManual = e.target.value === 'manual';
                document.getElementById(bleSectionId).classList.toggle('hidden', isManual);
                document.getElementById(manualSectionId).classList.toggle('hidden', !isManual);
            });
        }
        setupModeToggle('mode-temp', 'section-temp-ble', 'section-temp-manual');
        setupModeToggle('mode-o2', 'section-o2-ble', 'section-o2-manual');
        setupModeToggle('mode-d40', 'section-d40-ble', 'section-d40-manual');

        document.getElementById('manual-d40-type').addEventListener('change', (e) => {
            const isBg = e.target.value === 'bg';
            document.getElementById('manual-d40-bp-inputs').classList.toggle('hidden', isBg);
            document.getElementById('manual-d40-bg-inputs').classList.toggle('hidden', !isBg);
        });

        // --- 模擬上傳與資料加入邏輯 ---
        function addRecord(device, type, valueStr) {
            const record = {
                id: Date.now() + Math.floor(Math.random() * 1000),
                device: device,
                type: type,
                value: valueStr,
                time: new Date().toLocaleTimeString()
            };
            pendingRecords.push(record);
            updatePendingUI();
        }

        function updatePendingUI() {
            const countEl = document.getElementById('pending-count');
            const listEl = document.getElementById('pending-list');
            const btnUpload = document.getElementById('btn-upload');
            
            countEl.textContent = pendingRecords.length;
            
            if (pendingRecords.length === 0) {
                listEl.innerHTML = '<li class="text-gray-400 text-center py-2">目前無待上傳資料</li>';
                btnUpload.disabled = true;
            } else {
                listEl.innerHTML = pendingRecords.map(r => 
                    `<li class="bg-gray-50 border border-gray-200 rounded p-2 flex justify-between">
                        <span class="font-medium text-gray-700">${r.device}</span>
                        <span class="text-gray-600">${r.value}</span>
                        <span class="text-gray-400 text-xs">${r.time}</span>
                    </li>`
                ).reverse().join('');
                btnUpload.disabled = false;
            }
        }

        document.getElementById('btn-upload').addEventListener('click', () => {
            const patientId = document.getElementById('patient-id').value.trim();
            if (!patientId) {
                alert('請先輸入病歷號');
                document.getElementById('patient-id').focus();
                return;
            }
            
            log(`開始將 ${pendingRecords.length} 筆資料上傳至病歷號 [${patientId}]`, 'info');
            document.getElementById('btn-upload').textContent = '上傳中...';
            document.getElementById('btn-upload').disabled = true;
            
            setTimeout(() => {
                log(`病歷號 [${patientId}] 資料上傳成功`, 'success');
                pendingRecords = [];
                updatePendingUI();
                document.getElementById('btn-upload').textContent = '執行上傳';
                alert('上傳成功');
            }, 1000);
        });

        // --- 手動輸入處理 ---
        document.getElementById('btn-manual-temp-add').addEventListener('click', () => {
            const val = document.getElementById('manual-temp-val').value;
            const unit = document.getElementById('manual-temp-unit').value;
            if (!val) return alert('請輸入溫度數值');
            addRecord('TD-1242B (手動)', 'Temperature', `${parseFloat(val).toFixed(2)} °${unit}`);
            document.getElementById('manual-temp-val').value = '';
            log(`手動加入溫度資料: ${val} °${unit}`, 'success');
        });

        document.getElementById('btn-manual-o2-add').addEventListener('click', () => {
            const spo2 = document.getElementById('manual-o2-spo2').value;
            const hr = document.getElementById('manual-o2-hr').value;
            if (!spo2 || !hr) return alert('請完整輸入血氧與心率數值');
            addRecord('TD-8255B (手動)', 'SpO2/HR', `血氧:${spo2}% 心率:${hr}`);
            document.getElementById('manual-o2-spo2').value = '';
            document.getElementById('manual-o2-hr').value = '';
            log(`手動加入血氧資料: SpO2 ${spo2}%, HR ${hr} bpm`, 'success');
        });

        document.getElementById('btn-manual-d40-add').addEventListener('click', () => {
            const type = document.getElementById('manual-d40-type').value;
            if (type === 'bp') {
                const sys = document.getElementById('manual-d40-sys').value;
                const dia = document.getElementById('manual-d40-dia').value;
                if (!sys || !dia) return alert('請完整輸入收縮壓與舒張壓');
                addRecord('TD-3261B (手動)', 'Blood Pressure', `血壓:${sys}/${dia} mmHg`);
                document.getElementById('manual-d40-sys').value = '';
                document.getElementById('manual-d40-dia').value = '';
                log(`手動加入血壓資料: SYS ${sys}, DIA ${dia} mmHg`, 'success');
            } else {
                const bg = document.getElementById('manual-d40-bg').value;
                if (!bg) return alert('請輸入血糖數值');
                addRecord('TD-3261B (手動)', 'Blood Glucose', `血糖:${bg} mg/dL`);
                document.getElementById('manual-d40-bg').value = '';
                log(`手動加入血糖資料: ${bg} mg/dL`, 'success');
            }
        });

        // --- 藍牙設備通訊邏輯 (體溫計) ---
        document.getElementById('btn-temp-connect').addEventListener('click', async () => {
            try {
                log('請求 TD-1242B 設備...', 'info');
                tempDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'FORA IR42' }, { namePrefix: 'FORA' }, { namePrefix: 'TAIDOC' }],
                    optionalServices: [0x1809]
                });

                tempDevice.addEventListener('gattserverdisconnected', onTempDisconnected);
                document.getElementById('temp-status').textContent = '連線中...';
                
                const server = await tempDevice.gatt.connect();
                const service = await server.getPrimaryService(0x1809);
                tempCharacteristic = await service.getCharacteristic(0x2A1C); 
                
                await tempCharacteristic.startNotifications();
                tempCharacteristic.addEventListener('characteristicvaluechanged', handleTemperatureData);
                
                document.getElementById('btn-temp-connect').classList.add('hidden');
                document.getElementById('btn-temp-disconnect').classList.remove('hidden');
                document.getElementById('temp-status').textContent = '已連線';
                document.getElementById('temp-status').classList.replace('text-gray-500', 'text-green-600');
                log('TD-1242B 連線成功並開啟接收通道', 'success');

            } catch (error) {
                log(`TD-1242B 連線失敗: ${error}`, 'error');
                document.getElementById('temp-status').textContent = '連線失敗';
            }
        });

        document.getElementById('btn-temp-disconnect').addEventListener('click', () => {
            if (tempDevice && tempDevice.gatt.connected) tempDevice.gatt.disconnect();
        });

        function onTempDisconnected() {
            log('TD-1242B 已斷開連線', 'error');
            tempCharacteristic = null;
            document.getElementById('btn-temp-connect').classList.remove('hidden');
            document.getElementById('btn-temp-disconnect').classList.add('hidden');
            document.getElementById('temp-status').textContent = '未連線';
            document.getElementById('temp-status').classList.replace('text-green-600', 'text-gray-500');
        }

        function handleTemperatureData(event) {
            const value = event.target.value;
            const flags = value.getUint8(0);
            const isFahrenheit = (flags & 0x01) !== 0;
            
            const b1 = value.getUint8(1);
            const b2 = value.getUint8(2);
            const b3 = value.getUint8(3);
            const exponent = value.getInt8(4);
            
            let mantissa = (b3 << 16) | (b2 << 8) | b1;
            if ((mantissa & 0x00800000) > 0) mantissa |= 0xFF000000;
            
            const temperature = mantissa * Math.pow(10, exponent);
            const tempStr = temperature.toFixed(2);
            const unitStr = isFahrenheit ? '°F' : '°C';
            
            document.getElementById('temp-value').textContent = tempStr;
            document.getElementById('temp-unit').textContent = unitStr;
            triggerUIFlash('temp-display-container');
            
            log(`接收體溫資料: ${tempStr} ${unitStr}`, 'data');
            addRecord('TD-1242B', 'Temperature', `${tempStr} ${unitStr}`);
        }

        // --- 藍牙設備通訊邏輯 (血氧機) ---
        const TAIDOC_SERVICE_UUID = '00001523-1212-efde-1523-785feabcd123';
        const TAIDOC_CHAR_UUID = '00001524-1212-efde-1523-785feabcd123';

        document.getElementById('btn-o2-connect').addEventListener('click', async () => {
            try {
                log('請求 TD-8255B 設備...', 'info');
                o2Device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'FORA O2' }, { namePrefix: 'FORA' }],
                    optionalServices: [TAIDOC_SERVICE_UUID]
                });

                o2Device.addEventListener('gattserverdisconnected', onO2Disconnected);
                document.getElementById('o2-status').textContent = '連線中...';
                
                const server = await o2Device.gatt.connect();
                const service = await server.getPrimaryService(TAIDOC_SERVICE_UUID);
                o2Characteristic = await service.getCharacteristic(TAIDOC_CHAR_UUID);
                
                await o2Characteristic.startNotifications();
                o2Characteristic.addEventListener('characteristicvaluechanged', handleO2Data);
                
                document.getElementById('btn-o2-connect').classList.add('hidden');
                document.getElementById('btn-o2-disconnect').classList.remove('hidden');
                document.getElementById('o2-status').textContent = '已連線';
                document.getElementById('o2-status').classList.replace('text-gray-500', 'text-green-600');
                log('TD-8255B 連線成功並開啟接收通道', 'success');

            } catch (error) {
                log(`TD-8255B 連線失敗: ${error}`, 'error');
                document.getElementById('o2-status').textContent = '連線失敗';
            }
        });

        document.getElementById('btn-o2-disconnect').addEventListener('click', () => {
            if (o2Device && o2Device.gatt.connected) o2Device.gatt.disconnect();
        });

        function onO2Disconnected() {
            log('TD-8255B 已斷開連線', 'error');
            o2Characteristic = null;
            document.getElementById('btn-o2-connect').classList.remove('hidden');
            document.getElementById('btn-o2-disconnect').classList.add('hidden');
            document.getElementById('o2-status').textContent = '未連線';
            document.getElementById('o2-status').classList.replace('text-green-600', 'text-gray-500');
        }

        function handleO2Data(event) {
            const value = event.target.value;
            if (value.byteLength >= 8 && value.getUint8(0) === 0x51) {
                const command = value.getUint8(1);
                if (command === 0x26 || command === 0x25) {
                    const spo2 = value.getUint8(2);
                    const hr = value.getUint8(5);
                    
                    document.getElementById('o2-spo2-value').textContent = spo2;
                    document.getElementById('o2-hr-value').textContent = hr;
                    
                    triggerUIFlash('o2-spo2-container');
                    triggerUIFlash('o2-hr-container');
                    
                    log(`接收血氧資料: SpO2 ${spo2}%, HR ${hr} bpm`, 'data');
                    addRecord('TD-8255B', 'SpO2/HR', `血氧:${spo2}% 心率:${hr}`);
                }
            }
        }

        // --- 藍牙設備通訊邏輯 (血糖血壓機) ---
        document.getElementById('btn-d40-connect').addEventListener('click', async () => {
            try {
                log('請求 TD-3261B 設備...', 'info');
                d40Device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'FORA D40' }, { namePrefix: 'FORA' }, { namePrefix: 'TAIDOC' }],
                    optionalServices: [TAIDOC_SERVICE_UUID, 0x1810, 0x1808]
                });

                d40Device.addEventListener('gattserverdisconnected', onD40Disconnected);
                document.getElementById('d40-status').textContent = '連線中...';
                
                const server = await d40Device.gatt.connect();
                
                const service = await server.getPrimaryService(TAIDOC_SERVICE_UUID);
                d40Characteristic = await service.getCharacteristic(TAIDOC_CHAR_UUID);
                
                await d40Characteristic.startNotifications();
                d40Characteristic.addEventListener('characteristicvaluechanged', handleD40Data);
                
                document.getElementById('btn-d40-connect').classList.add('hidden');
                document.getElementById('btn-d40-disconnect').classList.remove('hidden');
                document.getElementById('d40-status').textContent = '已連線';
                document.getElementById('d40-status').classList.replace('text-gray-500', 'text-green-600');
                log('TD-3261B 連線成功並開啟接收通道', 'success');

            } catch (error) {
                log(`TD-3261B 連線失敗: ${error}`, 'error');
                document.getElementById('d40-status').textContent = '連線失敗';
            }
        });

        document.getElementById('btn-d40-disconnect').addEventListener('click', () => {
            if (d40Device && d40Device.gatt.connected) d40Device.gatt.disconnect();
        });

        function onD40Disconnected() {
            log('TD-3261B 已斷開連線', 'error');
            d40Characteristic = null;
            document.getElementById('btn-d40-connect').classList.remove('hidden');
            document.getElementById('btn-d40-disconnect').classList.add('hidden');
            document.getElementById('d40-status').textContent = '未連線';
            document.getElementById('d40-status').classList.replace('text-green-600', 'text-gray-500');
        }

        function handleD40Data(event) {
            const value = event.target.value;
            const hexStr = buf2hex(value.buffer);
            log(`接收 TD-3261B 原始資料: ${hexStr}`, 'data');

            if (value.byteLength >= 8 && value.getUint8(0) === 0x51) {
                const command = value.getUint8(1);
                
                if (command === 0x26 || command === 0x25) {
                    const byte2 = value.getUint8(2);
                    const byte3 = value.getUint8(3);

                    if (byte3 > 0) {
                        const sys = byte2;
                        const dia = byte3;
                        
                        document.getElementById('d40-sys-value').textContent = sys;
                        document.getElementById('d40-dia-value').textContent = dia;
                        triggerUIFlash('d40-bp-container');
                        
                        log(`解析結果 -> 血壓: SYS ${sys}, DIA ${dia} mmHg`, 'success');
                        addRecord('TD-3261B', 'Blood Pressure', `血壓:${sys}/${dia} mmHg`);
                    } else {
                        const bgValue = byte2 + (byte3 << 8);
                        
                        document.getElementById('d40-bg-value').textContent = bgValue;
                        triggerUIFlash('d40-bg-container');
                        
                        log(`解析結果 -> 血糖: ${bgValue} mg/dL`, 'success');
                        addRecord('TD-3261B', 'Blood Glucose', `血糖:${bgValue} mg/dL`);
                    }
                }
            }
        }
    </script>
</body>
